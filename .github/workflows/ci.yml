name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: install (zero runtime deps)
        run: pip install -e .
      - name: guards (tests)
        run: python tests/test_looplab.py
      - name: engine + executor (tests)
        run: |
          python tests/test_engine.py
          python tests/test_executors.py
      - name: demos run
        run: |
          python examples/agent_claims.py
          python examples/research_loop_demo.py
          python examples/autonomous_research_loop.py --rounds 2 --allow-exec
